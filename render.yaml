services:
  # Backend API - NestJS (Free Tier)
  - type: web
    name: waey-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run seed && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
        required: true
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: CLIENT_URL
        value: https://waey-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://waey-frontend.onrender.com,http://localhost:3000
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend - React/Vite Static Site (Free Tier - Always On)
  - type: web
    name: waey-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: waey-backend
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: waey-backend
          property: host

  # Note: Redis removed for free tier (750 hours limit)
  # Add Redis later when upgrading to paid plan
