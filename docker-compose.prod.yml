# Complete Docker Compose for Waey Platform

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:10000"
    environment:
      - NODE_ENV=production
      - PORT=10000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-your_refresh_secret_here}
      - JWT_EXPIRES_IN=7d
      - REFRESH_TOKEN_EXPIRES_IN=30d
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:4000
    volumes:
      - backend_uploads:/app/data/uploads
    depends_on:
      - mongo
    networks:
      - waey-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000
        - VITE_SOCKET_URL=http://localhost:4000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - waey-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - waey-network
    restart: unless-stopped

networks:
  waey-network:
    driver: bridge

volumes:
  mongo_data:
  backend_uploads:
